# config.yaml — Configuración centralizada del pipeline (Hydra)
# Todos los parámetros en un solo lugar.
# Ejecutar con: python main.py

main:
  project_name: model-attrition-mlflow
  experiment_name: employee_attrition
  mlflow_tracking_uri: mlruns          # ruta local; cambiar a URL remota en producción
  random_state: 42

  # Etapas a ejecutar (comentar las que no se necesiten)
  execute_steps:
    - download
    - preprocess
    - segregate
    - check_data
    - random_forest
    - evaluate
    - drift

data:
  raw_path:   data/attrition_data_raw.csv
  clean_path: data/attrition_data_clean.csv
  train_path: data/attrition_train.csv
  test_path:  data/attrition_test.csv
  test_size:  0.20

model:
  n_estimators:       [100, 200, 300]
  max_depth:          [5, 8, 10]
  min_samples_split:  [2, 5, 10]
  cv_folds:           5
  scoring:            f1
  auc_threshold:      0.70      # quality gate: falla si AUC < este valor
  f1_threshold:       0.20

drift:
  reference_path:  data/attrition_train.csv
  current_path:    data/attrition_test.csv
  drift_threshold: 0.30          # alerta si >30% features con drift

serve:
  host: 0.0.0.0
  port: 8000
  model_name: EmployeeAttritionModel
  model_stage: Production
